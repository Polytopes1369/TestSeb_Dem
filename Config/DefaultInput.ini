; DefaultInput.ini - Keybindings for developer debugging and profiling of MegaLights
; Allows real-time toggling of visualizers and triggering GPU profile captures

[/Script/Engine.InputSettings]
; Toggle the interactive MegaLights Light Complexity visualizer (shows pixel-light connections and weights)
.Bindings=(Name="F9",Command="toggle r.MegaLights.Visualize.LightComplexity")

; Toggle the pixel-level stochastic ray tracing debugger
.Bindings=(Name="F10",Command="toggle r.MegaLights.Debug")

; Capture a detailed snapshot of the GPU frame (isolated passes like Light Injection and Denoising)
.Bindings=(Name="F11",Command="profilegpu")
