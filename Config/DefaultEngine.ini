; DefaultEngine.ini - Configuration for Unreal Engine 5.8 rendering pipeline
; Enforces DX12/Vulkan, SM6, Hardware Ray Tracing, Lumen, and MegaLights (Many Lights sampling)

[/Script/Engine.RendererSettings]
; Enable Dynamic Global Illumination and Reflections via Lumen
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.ShadowMapMethod=1 ; Virtual Shadow Maps (VSM)

; Enable Hardware Ray Tracing Support and associated requirements
r.HardwareRayTracing=1
r.RayTracing=1
bUseHardwareRayTracing=True
bSupportComputeSkinCache=True

; Lumen Hardware Ray Tracing and Reflections settings
r.Lumen.HardwareRayTracing=1
r.Lumen.UseHardwareRayTracingWhenAvailable=True
r.Lumen.Reflections.HardwareRayTracing=1
r.Lumen.ScreenProbeGather.HardwareRayTracing=1
r.LumenScene.DirectLighting.HardwareRayTracing=1

; MegaLights configurations (stochastic direct lighting path)
r.MegaLights=1
r.MegaLights.Allow=1
r.MegaLights.EnableForProject=True
r.MegaLights.NumSamplesPerPixel=1

; Many Lights dynamic shadow allocation and sampling settings
r.ManyLights=2
r.ManyLights.Sampling=1
r.ManyLights.Shadows=1
r.ManyLights.Sampling.MinWeight=0.01

[/Script/WindowsTargetPlatform.WindowsTargetSettings]
DefaultGraphicsRHI=DefaultGraphicsRHI_DX12
-D3D12TargetedShaderFormats=PCD3D_SM5
+D3D12TargetedShaderFormats=PCD3D_SM6

[/Script/LinuxTargetPlatform.LinuxTargetSettings]
DefaultGraphicsRHI=DefaultGraphicsRHI_Vulkan
-TargetedRHIs=SF_VULKAN_SM5
+TargetedRHIs=SF_VULKAN_SM6

[SystemSettings]
; Force specific console variables in SystemSettings for runtime persistence
r.ShaderModel=6
r.RayTracing.Enable=1
r.Lumen.HardwareRayTracing=1
r.MegaLights=1
r.MegaLights.Allow=1
r.ManyLights=2
r.ManyLights.Sampling=1
r.ManyLights.Shadows=1
