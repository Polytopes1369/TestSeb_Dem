; DefaultScalability.ini - Quality profiles for Unreal Engine 5.8 rendering features
; Configures the ShadowQuality group to scale MegaLights and shadow complexity

[ShadowQuality@0]
; Low profile - Disable MegaLights and hardware-intensive shadows for maximum performance
r.MegaLights=0
r.MegaLights.Allow=0
r.MegaLights.ShadowSamples=0
r.MegaLights.NumSamplesPerPixel=0
r.MegaLights.MaxLights=0
r.MegaLights.MaxLocalLights=0
r.MegaLights.DownsampleMode=3 ; Aggressive downsample (4x4 tiles or disabled)

[ShadowQuality@1]
; Medium profile - Entry level MegaLights setup with high culling and downsampled buffer
r.MegaLights=1
r.MegaLights.Allow=1
r.MegaLights.ShadowSamples=1
r.MegaLights.NumSamplesPerPixel=1
r.MegaLights.MaxLights=128
r.MegaLights.MaxLocalLights=128
r.MegaLights.DownsampleMode=2 ; Checkerboard / downsampled tracing (half res)
r.MegaLights.Temporal.MaxFramesAccumulated=16

[ShadowQuality@2]
; High profile - Balanced performance and shadow details
r.MegaLights=1
r.MegaLights.Allow=1
r.MegaLights.ShadowSamples=2
r.MegaLights.NumSamplesPerPixel=2
r.MegaLights.MaxLights=256
r.MegaLights.MaxLocalLights=256
r.MegaLights.DownsampleMode=1 ; Minimal downsampling
r.MegaLights.Temporal.MaxFramesAccumulated=12

[ShadowQuality@3]
; Epic profile - High quality shadows with soft penumbras and large pool
r.MegaLights=1
r.MegaLights.Allow=1
r.MegaLights.ShadowSamples=4
r.MegaLights.NumSamplesPerPixel=4
r.MegaLights.MaxLights=512
r.MegaLights.MaxLocalLights=512
r.MegaLights.DownsampleMode=0 ; Full resolution tracing
r.MegaLights.Temporal.MaxFramesAccumulated=8

[ShadowQuality@4]
; Cinematic profile - Production quality tracing with high light capacity
r.MegaLights=1
r.MegaLights.Allow=1
r.MegaLights.ShadowSamples=8
r.MegaLights.NumSamplesPerPixel=8
r.MegaLights.MaxLights=1024
r.MegaLights.MaxLocalLights=1024
r.MegaLights.DownsampleMode=0 ; Full resolution tracing
r.MegaLights.Temporal.MaxFramesAccumulated=6
